version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: havenhositing-db
    environment:
      POSTGRES_USER: ${DB_USER:-havenhositing}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secure_password}
      POSTGRES_DB: ${DB_NAME:-havenhositing}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - havenhositing-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-havenhositing}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: havenhositing-cache
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - havenhositing-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: havenhositing-backend
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 5000
      DB_HOST: postgres
      DB_USER: ${DB_USER:-havenhositing}
      DB_PASSWORD: ${DB_PASSWORD:-secure_password}
      DB_NAME: ${DB_NAME:-havenhositing}
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-your_jwt_secret_key}
      API_URL: ${API_URL:-http://localhost:5000}
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./server:/app
      - /app/node_modules
    networks:
      - havenhositing-network

  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: havenhositing-frontend
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:5000}
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./client:/app
      - /app/node_modules
      - /app/.next
    networks:
      - havenhositing-network

  nginx:
    image: nginx:alpine
    container_name: havenhositing-proxy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
      - frontend
    networks:
      - havenhositing-network

volumes:
  postgres_data:
  redis_data:

networks:
  havenhositing-network:
    driver: bridge
